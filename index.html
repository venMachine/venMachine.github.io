<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Home page</title>
    <meta content="" name="author">
    <meta content="" name="description">
    <meta content="" name="keywords">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta content="ie=edge" http-equiv="x-ua-compatible">
    <link rel="stylesheet" href="/assets/css/foundation.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <script src="/assets/js/foundation.js" defer></script>
    <script src="/assets/js/app.js" defer></script><!--[if lt IE 9]>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.2/html5shiv.min.js"></script><![endif]-->
  </head>
  <body>
    <div class="wrapper">
      <div class="center">
        <div class="center_up">
          <div class="center_up-left">
            <h3>Кошелек пользователя</h3>
            <form class="class_form">
              <div class="block">
                <div class="mony_item-form">1руб</div>
                <div class="counter_item-form">10штук</div>
                <input class="input_item-form" value="0" name="counter_1" required="">
              </div>
              <div class="block">
                <div class="mony_item-form">2руб</div>
                <div class="counter_item-form">10штук</div>
                <input class="input_item-form" value="0" name="counter_2" required="">
              </div>
              <div class="block">
                <div class="mony_item-form">5руб</div>
                <div class="counter_item-form">10штук</div>
                <input class="input_item-form" value="0" name="counter_5" required="">
              </div>
              <div class="block">
                <div class="mony_item-form">10руб</div>
                <div class="counter_item-form">10штук</div>
                <input class="input_item-form" value="0" name="counter_10" required="">
              </div>
              <button class="buttonform">Внести</button>
            </form>
          </div>
          <div class="center_up-middle">
            <h3>Внесенная сумма</h3>
            <p class="center_up-middle-p"></p>
          </div>
          <div class="center_up-right">
            <h3>Кошелек VM</h3>
            <form class="class_formVM">
              <div class="block">
                <div class="mony_item-formVM">1руб</div>
                <div class="counter_item-formVM">100штук</div>
              </div>
              <div class="block">
                <div class="mony_item-formVM">2руб</div>
                <div class="counter_item-formVM">100штук</div>
              </div>
              <div class="block">
                <div class="mony_item-formVM">5руб</div>
                <div class="counter_item-formVM">100штук</div>
              </div>
              <div class="block">
                <div class="mony_item-formVM">10руб</div>
                <div class="counter_item-formVM">100штук</div>
              </div>
              <button class="buttonformVM">Сдача</button>
            </form>
          </div>
        </div>
        <div class="center_down">
          <div class="center_down-item"><a class="center_down-item--a" id="tea">Чай 13 руб</a>
            <p class="center_down-item--p">10 порций</p>
          </div>
          <div class="center_down-item"><a class="center_down-item--a" id="coffee"> Кофе 18 руб</a>
            <p class="center_down-item--p">20 порций</p>
          </div>
          <div class="center_down-item"><a class="center_down-item--a" id="late"> Кофе с молоком 21 руб</a>
            <p class="center_down-item--p">20 порций</p>
          </div>
          <div class="center_down-item"><a class="center_down-item--a" id="juice"> Сок 35 руб</a>
            <p class="center_down-item--p">15 порций</p>
          </div>
        </div>
      </div>
      <div class="modal">
        <div class="modal_center">
          <div class="modal_center-text"></div><a class="modal_center-button">Закрыть</a>
        </div>
      </div>
    </div>
  </body>
</html>
